<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script type="text/javascript">
      // Original script by Rafael Pedicini, licensed under the MIT license
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>



    <!-- SEO Optimization -->
    <title>Gardenz - Boutique CBD Premium | Wellness & Extreme Lab</title>
    <meta
      name="description"
      content="Découvrez Gardenz, l'expert du CBD en France. Huiles, Fleurs, Vapes et Lifestyle. Livraison Express 24h/48h. Produits testés en laboratoire et 100% légaux."
    />
    <link rel="canonical" href="https://gardenz.fr/" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="robots" content="index, follow" />

    <!-- LCP Optimizations: Preload the main Hero image -->
    <link rel="preload" as="image" href="/images/home-page/hero-wellness.webp" type="image/webp" />

    <!-- Google Fonts : non-bloquant (évite le render-blocking) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet" media="print" onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    </noscript>
    <link rel="stylesheet" href="/index.css" />
    <!-- Inline CSS for First Contentful Paint (FCP) fast load -->
    <style>
      body { background-color: #0c0f0a; margin: 0; }
      #root:empty {
        display: block;
        height: 100vh;
        width: 100vw;
        background-color: #0c0f0a;
      }
    </style>
  </head>

  </body>
